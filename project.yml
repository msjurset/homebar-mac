name: HomeBar
options:
  bundleIdPrefix: com.msjurset
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

targets:
  HomeBar:
    type: application
    platform: macOS
    sources:
      - Sources/HomeBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.msjurset.homebar
        PRODUCT_NAME: HomeBar
        MARKETING_VERSION: "0.1.2"
        CURRENT_PROJECT_VERSION: "5"
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_CFBundleDisplayName: HomeBar
        INFOPLIST_KEY_LSUIElement: YES
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_APP_SANDBOX: NO
